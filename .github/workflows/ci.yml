name: TrustHire AI — CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Lint & type-check frontend ────────────────────────────────────────
  frontend-check:
    name: Frontend — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret-placeholder-32-chars-ok!
          NEXT_PUBLIC_API_URL: http://localhost:8000
          GOOGLE_CLIENT_ID: placeholder
          GOOGLE_CLIENT_SECRET: placeholder

  # ── 2. Test API ───────────────────────────────────────────────────────────
  api-test:
    name: API — tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trusthire_test
          POSTGRES_USER: trusthire
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://trusthire:test_password@localhost:5432/trusthire_test
          REDIS_URL: redis://localhost:6379/0
          NEXTAUTH_SECRET: ci-test-secret-placeholder-32chars!
          LLM_PROVIDER: ollama
          LLM_MODEL: llama3.2:8b
          ENCRYPTION_KEY: ""
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            --asyncio-mode=auto \
            -x

  # ── 3. Docker build check ─────────────────────────────────────────────────
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [frontend-check, api-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./infrastructure/docker/Dockerfile.api
          push: false
          tags: trusthire-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./infrastructure/docker/Dockerfile.web
          push: false
          tags: trusthire-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.example.com
            NEXTAUTH_URL=https://example.com

  # ── 4. Deploy to staging ──────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/trusthire

            echo "Pulling latest code..."
            git fetch origin develop
            git reset --hard origin/develop

            echo "Starting deployment..."
            docker compose pull || true
            docker compose up -d --build --remove-orphans

            echo "Running migrations..."
            docker compose exec -T api alembic upgrade head || true

            echo "Health check..."
            sleep 10
            curl -f http://localhost:8000/health || exit 1

            echo "✅ Staging deployment complete"

  # ── 5. Deploy to production ───────────────────────────────────────────────
  deploy-production:
    name: Deploy — production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/trusthire

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Deploying with zero-downtime rolling restart..."
            docker compose pull || true

            # Rolling restart: API first, then workers
            docker compose up -d --build --no-deps --remove-orphans api
            sleep 5
            docker compose exec -T api alembic upgrade head
            docker compose up -d --build --no-deps worker-parsing worker-verification
            docker compose up -d --build --no-deps web
            docker compose up -d --build --no-deps nginx

            echo "Health check..."
            sleep 10
            curl -f http://localhost:8000/health || exit 1
            curl -f http://localhost:3000 || exit 1

            echo "✅ Production deployment complete"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Production deployment failed for TrustHire AI\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
