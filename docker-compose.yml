version: "3.9"

# TrustHire AI — Docker Compose
# Voice calls removed. Uses free cloud LLMs (Gemini/Groq/Mistral/Cohere).
# No GPU or heavy models needed — all AI inference is cloud-based.

services:
  # ── Frontend ──────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.web
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_API_URL: http://localhost:8000
      DATABASE_URL: postgresql://trusthire:${POSTGRES_PASSWORD:-password}@postgres:5432/trusthire
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://trusthire:${POSTGRES_PASSWORD:-password}@postgres:5432/trusthire
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      # ── Free LLM provider (pick one) ──
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_MODEL_PRO: ${GEMINI_MODEL_PRO:-gemini-1.5-pro}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      # ── Storage ──
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: trusthire-documents
      MINIO_SECURE: "false"
      # ── Email ──
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-verify@example.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      # ── Security ──
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # ── App ──
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  # ── Celery Workers ────────────────────────────────────────────────────────
  worker-parsing:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    command: celery -A tasks.celery_app worker -Q parsing -c 2 -l info --without-heartbeat
    environment:
      DATABASE_URL: postgresql+asyncpg://trusthire:${POSTGRES_PASSWORD:-password}@postgres:5432/trusthire
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: trusthire-documents
      MINIO_SECURE: "false"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-verify@example.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - ./apps/api:/app
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker-verification:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    command: celery -A tasks.celery_app worker -Q verification,email,reports,scheduled -c 4 -l info --without-heartbeat
    environment:
      DATABASE_URL: postgresql+asyncpg://trusthire:${POSTGRES_PASSWORD:-password}@postgres:5432/trusthire
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: trusthire-documents
      MINIO_SECURE: "false"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-verify@example.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - ./apps/api:/app
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  celery-beat:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    command: celery -A tasks.celery_app beat -l info -s /tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+asyncpg://trusthire:${POSTGRES_PASSWORD:-password}@postgres:5432/trusthire
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379/0
    volumes:
      - ./apps/api:/app
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    command: >
      celery
      --broker=redis://:${REDIS_PASSWORD:-password}@redis:6379/0
      flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASS:-admin}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

  # ── Databases ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trusthire
      POSTGRES_USER: trusthire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trusthire"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-password}
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Vector DB ─────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Object Storage ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ── Monitoring ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Reverse Proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  grafana_data:
